<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF News HQ - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #151a28;
            --bg-sidebar: #0d1120;
            --primary-yellow: #ffc107;
            --primary-yellow-dark: #e0a800;
            --text-light: #e0e0e0;
            --white: #ffffff;
            --border-color: #2a2f42;
            --danger: #e74c3c;
            --success: #2ecc71;
            --info: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-light); min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        /* LOGIN PAGE */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e17 0%, #151a28 100%);
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-logo {
            font-family: 'Oswald', sans-serif;
            font-size: 26px;
            font-style: italic;
            color: var(--white);
            margin-bottom: 5px;
        }
        .login-logo span { color: var(--primary-yellow); }
        .login-subtitle { font-size: 13px; color: #888; margin-bottom: 35px; }
        .login-admin-badge {
            background: rgba(255,193,7,0.1);
            border: 1px solid rgba(255,193,7,0.3);
            color: var(--primary-yellow);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { font-size: 13px; color: #aaa; margin-bottom: 8px; display: block; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--white);
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary-yellow); }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--primary-yellow);
            color: #000;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover { background: var(--primary-yellow-dark); transform: translateY(-2px); }
        .login-error {
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* ADMIN LAYOUT */
        .admin-layout { display: flex; min-height: 100vh; display: none; }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            transition: 0.3s;
        }
        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .sidebar-logo { font-family: 'Oswald', sans-serif; font-size: 20px; font-style: italic; color: var(--white); }
        .sidebar-logo span { color: var(--primary-yellow); }
        .sidebar-badge { font-size: 10px; color: #888; margin-top: 4px; }
        .sidebar-nav { flex: 1; padding: 20px 0; overflow-y: auto; }
        .nav-section-title { font-size: 10px; color: #555; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 15px 20px 8px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            font-size: 14px;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--primary-yellow); border-left-color: var(--primary-yellow); background: rgba(255,193,7,0.05); }
        .nav-item i { width: 18px; text-align: center; font-size: 15px; }
        .nav-badge {
            margin-left: auto;
            background: var(--primary-yellow);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
        }
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border-color); }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.2);
            color: #e74c3c;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logout-btn:hover { background: rgba(231,76,60,0.2); }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TOP BAR */
        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-title { font-size: 18px; font-weight: 600; color: var(--white); }
        .topbar-right { display: flex; align-items: center; gap: 15px; }
        .topbar-admin {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #aaa;
        }
        .admin-avatar {
            width: 34px;
            height: 34px;
            background: var(--primary-yellow);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
        }

        /* PAGE CONTENT */
        .page-content { padding: 30px; flex: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* STATS CARDS */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .stat-icon.yellow { background: rgba(255,193,7,0.1); color: var(--primary-yellow); }
        .stat-icon.blue { background: rgba(52,152,219,0.1); color: #3498db; }
        .stat-icon.green { background: rgba(46,204,113,0.1); color: #2ecc71; }
        .stat-icon.red { background: rgba(231,76,60,0.1); color: #e74c3c; }
        .stat-info h3 { font-size: 24px; color: var(--white); font-weight: 700; }
        .stat-info p { font-size: 12px; color: #888; }

        /* SECTION HEADER */
        .sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .sec-header h2 { font-size: 18px; color: var(--white); border-left: 4px solid var(--primary-yellow); padding-left: 12px; }
        .btn-add {
            background: var(--primary-yellow);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-add:hover { background: var(--primary-yellow-dark); transform: translateY(-2px); }

        /* NEWS TABLE */
        .news-table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .table-search {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .table-search input {
            padding: 9px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--white);
            font-size: 13px;
            width: 250px;
        }
        .table-search input:focus { outline: none; border-color: var(--primary-yellow); }
        .filter-select {
            padding: 9px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--white);
            font-size: 13px;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--primary-yellow); }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: rgba(255,255,255,0.02);
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }
        tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
        .td-thumb {
            width: 60px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            display: block;
        }
        .td-thumb-placeholder {
            width: 60px;
            height: 40px;
            border-radius: 6px;
            background: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #555;
        }
        .td-title { color: var(--white); font-weight: 600; max-width: 250px; line-height: 1.4; }
        .td-badge {
            background: rgba(255,193,7,0.1);
            color: var(--primary-yellow);
            border: 1px solid rgba(255,193,7,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .td-date { color: #888; font-size: 12px; }
        .action-btns { display: flex; gap: 8px; }
        .btn-edit {
            padding: 6px 12px;
            background: rgba(52,152,219,0.1);
            border: 1px solid rgba(52,152,219,0.3);
            color: #3498db;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-edit:hover { background: rgba(52,152,219,0.2); }
        .btn-delete {
            padding: 6px 12px;
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-delete:hover { background: rgba(231,76,60,0.2); }
        .empty-state { text-align: center; padding: 60px 20px; color: #555; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; display: block; }

        /* ADD/EDIT NEWS MODAL */
        .form-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            overflow-y: auto;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .form-modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }
        .form-modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            margin: auto;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        .form-modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .form-modal-header h3 { font-size: 16px; color: var(--white); }
        .modal-x {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .modal-x:hover { color: var(--white); background: rgba(255,255,255,0.1); }
        .form-modal-body { padding: 25px; }
        .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { margin-bottom: 20px; }
        .field.full { grid-column: 1 / -1; }
        .field label { display: block; font-size: 13px; color: #aaa; font-weight: 600; margin-bottom: 8px; }
        .field label span { color: #e74c3c; }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--white);
            font-size: 14px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary-yellow); }
        .field textarea { resize: vertical; min-height: 120px; }
        .field select option { background: var(--bg-card); }

        /* Image upload area */
        .img-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .img-upload-area:hover { border-color: var(--primary-yellow); background: rgba(255,193,7,0.03); }
        .img-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .img-upload-area i { font-size: 30px; color: #555; margin-bottom: 8px; display: block; }
        .img-upload-area p { font-size: 13px; color: #888; }
        .img-upload-area small { font-size: 11px; color: #555; }
        .img-preview {
            margin-top: 12px;
            display: none;
            position: relative;
            display: inline-block;
        }
        .img-preview img {
            max-height: 120px;
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .img-preview-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }
        /* OR divider for URL vs Upload */
        .or-divider { text-align: center; font-size: 12px; color: #555; margin: 10px 0; }

        .upload-progress {
            margin-top: 10px;
            display: none;
        }
        .progress-bar {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-yellow);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text { font-size: 12px; color: #888; margin-top: 5px; }

        .form-actions {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: #aaa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-cancel:hover { color: var(--white); background: rgba(255,255,255,0.1); }
        .btn-save {
            padding: 10px 24px;
            background: var(--primary-yellow);
            border: none;
            color: #000;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-save:hover { background: var(--primary-yellow-dark); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

        /* DELETE CONFIRM */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: var(--bg-card);
            border
