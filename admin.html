<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FF NEWS HQ - Admin Panel</title>
    <style>
        body { background: #0a0e17; color: white; font-family: sans-serif; padding: 20px; }
        .form-box { max-width: 400px; background: #151a28; padding: 20px; border-radius: 8px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { background: #ffc107; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Post New News</h2>
        <input type="text" id="title" placeholder="News Title">
        <input type="text" id="image" placeholder="Image URL (Direct Link)">
        <select id="category">
            <option value="NEWS">NEWS</option>
            <option value="LEAKS">LEAKS</option>
            <option value="EVENTS">EVENTS</option>
            <option value="UPDATES">UPDATES</option>
        </select>
        <button id="postBtn">POST NEWS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqhOmWuBFh4b7E7L6qBCbnegvEuPdMF2U",
            authDomain: "ff-tools-2-7c7c0.firebaseapp.com",
            databaseURL: "https://ff-tools-2-7c7c0-default-rtdb.firebaseio.com",
            projectId: "ff-tools-2-7c7c0",
            storageBucket: "ff-tools-2-7c7c0.firebasestorage.app",
            messagingSenderId: "410275542080",
            appId: "1:410275542080:web:a21ed2ee8e05e4f4d3dba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('postBtn').onclick = () => {
            const title = document.getElementById('title').value;
            const image = document.getElementById('image').value;
            const category = document.getElementById('category').value;
            const date = new Date().toLocaleDateString();

            if(title && image) {
                push(ref(db, 'news'), { title, image, category, date });
                alert("News Posted Successfully!");
                document.getElementById('title').value = '';
                document.getElementById('image').value = '';
            } else {
                alert("Bhai, Title aur Image link dono daalo!");
            }
        };
    </script>
</body>
</html>
